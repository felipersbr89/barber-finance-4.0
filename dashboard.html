<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gorilaz Barber Finance — Dashboard">
  <title>Dashboard — Gorilaz</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>

  <!-- App core (auth, utils, layout, icons) -->
  <script src="js/app.js"><\/script>

  <!-- Page module -->
  <script src="js/modules/dashboard.js"><\/script>
</head>
<body>
<div id="toast"></div>
<div id="shell" class="app-shell"></div>

<script>
(async () => {
  const user = await Auth.requireAuth()
  if (!user) return
  Layout.render(document.getElementById('shell'))
  DashboardModule.init(document.getElementById('page-content'))
})()
<\/script>
</body>
</html>
